<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문의 접수 완료</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#173f2b;color:#fff;display:grid;place-items:center;min-height:100vh;text-align:center;padding:24px}
    .box{background:#fffaf0;color:#171411;border:4px solid #c79a3a;border-radius:28px;padding:42px;max-width:560px;box-shadow:0 24px 70px rgba(0,0,0,.25)}
    h1{margin:0 0 12px;font-size:36px;letter-spacing:-.05em}
    p{font-size:18px;color:#4d443a}
    a{display:inline-block;margin-top:20px;background:#c79a3a;color:#171411;text-decoration:none;font-weight:900;padding:14px 22px;border-radius:999px}
  </style>
</head>
<body>
  <div class="box">
    <h1>가족점 문의가 접수되었습니다</h1>
    <p>입력해주신 내용 확인 후 빠르게 연락드리겠습니다.</p>
    <a href="index.html">홈페이지로 돌아가기</a>
  </div>
</body>
</html>
